name: Build wheels

on:
  push:
    tags: ["v*"]
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Fetch & verify SQLite amalgamation
        run: uv run --no-project python scripts/fetch_sqlite.py
      - name: Build sdist
        run: uv build --sdist
      - name: Verify sdist builds & tests offline
        run: |
          uv venv /tmp/sd
          uv pip install --python /tmp/sd dist/*.tar.gz pytest
          # Install in a throwaway dir so tests run against the installed pkg.
          /tmp/sd/bin/python -m pytest tests -q
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    name: Wheels ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each arch builds natively on its own runner -- no QEMU. Public repos
          # get free Linux arm64 runners (ubuntu-24.04-arm).
          - { name: linux-x86_64, os: ubuntu-latest, archs: x86_64 }
          - { name: linux-aarch64, os: ubuntu-24.04-arm, archs: aarch64 }
          - { name: macos-universal2, os: macos-latest, archs: universal2 }
          - { name: windows-amd64, os: windows-latest, archs: AMD64 }
    steps:
      - uses: actions/checkout@v4

      # cibuildwheel mounts the project dir into the build container, so a
      # host-side fetch makes vendor/ available to every platform (incl. the
      # manylinux container). This keeps the build offline & reproducible.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Fetch & verify SQLite amalgamation
        run: python scripts/fetch_sqlite.py

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_ARCHS: ${{ matrix.archs }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  # 32-bit Raspberry Pi OS (Debian armv7l). No native runner exists, so this
  # builds under QEMU emulation -- slower, hence its own job. 64-bit Pi OS is
  # already covered by the linux-aarch64 wheel above. We build manylinux only
  # (Raspberry Pi OS is glibc); musllinux armv7l is niche and doubles the slow
  # emulated build, so it is skipped here.
  linux-armv7l:
    name: Wheels linux-armv7l (emulated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Fetch & verify SQLite amalgamation
        run: python scripts/fetch_sqlite.py
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_ARCHS: armv7l
          CIBW_SKIP: "*-musllinux*"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-armv7l
          path: wheelhouse/*.whl

  # Pyodide / WebAssembly (wasm32). A single wheel for the Python + Emscripten
  # version Pyodide bundles. Selected directly via CIBW_PLATFORM (not gated by
  # CIBW_ENABLE). Tests must run through `python -m` under Node.
  pyodide:
    name: Wheels pyodide-wasm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch & verify SQLite amalgamation
        run: python scripts/fetch_sqlite.py
      - name: Build Pyodide wheel
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_PLATFORM: pyodide
          CIBW_TEST_COMMAND: "python -m pytest {project}/tests"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-pyodide
          path: wheelhouse/*.whl

  # PyPI publishing is intentionally disabled for now. On a vX.Y.Z tag we just
  # collect the built sdist + wheels and attach them to the GitHub Release.
  release:
    name: Attach artifacts to GitHub Release
    needs: [sdist, wheels, linux-armv7l, pyodide]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write  # create/update the release and upload assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -lR dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
